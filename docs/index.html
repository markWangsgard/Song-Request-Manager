<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/custom.css">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <script type="module" src="scripts/home-ui.js"></script>

    <link rel="icon" type="image/x-icon" href="images/favicon.png">
    <title>Snow College Western Swing</title>
</head>
<body class="d-flex flex-column">
    <header>
        <img src="images/logo.png" alt="Snow College Western Swing Logo" class="mx-auto d-block mt-4 mb-4 invert" style="width: 200px; height: auto;">
    </header>
    <main class="flex-grow-1 flex text-center justify-contet-center align-items-center">
        
        <nav class="navbar flex justify-content-center mt-4">
            <form class="form-inline">
                <input type="search" name="search" id="search" class="text-white rounded-pill form-control mr-sm-2 bg-tertiary" placeholder="Search" aria-label="Search">
            </form>
        </nav>
        <h1 class="text-primary" id="SectionHeader">Requested songs</h1>
        <div>
            <ol id="results">
                <div class="d-flex justify-content-center">
                    <img src="https://i.scdn.co/image/ab67616d00004851f00a1acf866539632b187ea0" alt="">
                    <div class="ms-3">
                        <h3>Die A Happy Man</h3>
                        <h4>Thomas Rhett</h4>
                    </div>
                </div>
            </ol>
        </div>
    </main>
</body>
</html>
