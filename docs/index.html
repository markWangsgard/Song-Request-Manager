<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="./css/custom.css" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lobster&display=swap"
      rel="stylesheet"
    />

    <link rel="manifest" href="manifest.json" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <script src="scripts/signalr/signalr.js"></script>
    <script type="module" src="scripts/home-ui.js"></script>
    <script type="module" src="scripts/updates.js"></script>
    <script type="module" src="scripts/navigation.js"></script>
    <script type="module" src="scripts/cowboy-loading.js"></script>

    <link rel="icon" type="image/x-icon" href="images/favicon.png" />
    <title>Snow College Western Swing</title>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("service-worker.js");
      }
    </script>
  </head>
  <body class="d-flex flex-column vh-100">
    <header>
      <img
        src="images/logo2.png"
        alt="Snow College Western Swing Logo"
        class="mx-auto d-block mt-5 invert"
        style="width: 200px; height: auto"
        id="logo"
      />
    </header>
    <main
      class="flex-grow-1 flex text-center justify-contet-center align-items-center"
    >
      <nav class="navbar flex justify-content-center mt-1">
        <input
          type="search"
          name="search"
          id="search"
          class="text-white w-75 rounded-pill form-control mr2-2 mb-4 bg-tertiary"
          placeholder="Search"
          aria-label="Search"
        />
      </nav>
      <h1 class="text-primary" id="SectionHeader">Requested songs</h1>
      <div id="results" class="d-flex flex-wrap mw-100 justify-content-center">
        <cowboy-loader size="200" speed="2.6s" color="white"></cowboy-loader>

        <!-- <h3> -->
        <!-- Service is still waking up. Please try again in 5 minutes. If it is -->
        <!-- still not working, please contact the creator. -->
        <!-- </h3> -->
      </div>
    </main>
    <footer class="text-center text-wrap bg-footer-responsive">
      <nav class="d-flex d-md-none justify-content-evenly mt-4">
        <button class="btn btn-primary rounded-5 d-flex justify-content-center align-items-center ps-4 pe-4" style="width: 45%;" id="request-songs-page-button">

          <h5 class="m-0">Request Songs</h5>
          <!-- <div style="height: 10px" class="bg-primary rounded"></div> -->
        </button>
        <button class="btn btn-outline-primary rounded-5 d-flex justify-content-center align-items-center ps-4 pe-4" style="width: 45%;" id="queue-page-button">
          <h5 class="m-0">Queue</h5>
          <!-- <div style="height: 10px" class="bg-primary rounded"></div> -->
        </button>
      </nav>
      <p class="mt-3 mb-4 ps-3 pe-3">
        See anything wrong? Please email us:
        <a href="mailto:mwangsard25@gmail.com?subject=Bug%20report"
          >mwangsard25@gmail.com</a
        >
      </p>
    </footer>
  </body>
</html>
