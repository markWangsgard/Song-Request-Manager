<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="./css/custom.css" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lobster&display=swap"
      rel="stylesheet"
    />

    <link rel="manifest" href="manifest.json" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <script src="scripts/signalr/signalr.js"></script>
    <script type="module" src="scripts/navigation.js"></script>
    <script type="module" src="scripts/cowboy-loading.js"></script>

    <script type="module" src="scripts/queue-ui.js"></script>

    <link rel="icon" type="image/x-icon" href="images/favicon.png" />
    <title>Snow College Western Swing</title>
  </head>
  <body class="d-flex flex-column min-vh-100">
    <header class="p-3">
      <img
        src="images/logo2.png"
        alt="Snow College Western Swing Logo"
        class="mx-auto d-block mt-5 invert"
        style="width: 200px; height: auto"
        id="logo"
      />
    </header>
    <main class="flex-grow-1 d-flex overflow-hidden flex-column">
      <cowboy-loader
        id="loader"
        size="200"
        speed="2.6s"
        color="white"
      ></cowboy-loader>
      <h1
        id="errorMessage"
        class="text-primary flex-grow-1 d-flex align-items-center justify-content-center text-center d-none"
      >
        No Music Being Played Currently
      </h1>
      <div class="flex-grow-1 overflow-hidden d-flex">
        <div class="container-fluid flex-grow-1">
          <div class="row flex-grow-1 overflow-hidden h-100 flex-column flex-md-row">
            <div
              id="currentlyPlayingSection"
              class="d-none text-center col-md-5 d-flex flex-column w-md-50 p-3"
            >
              <h1 class="text-primary mb-4" id="currentlyPlayingHeader">
                Currently Playing
              </h1>
              <div id="currentlyPlaying"></div>
              <div id="qrCode" class="d-none d-md-block">
                <h3 class="text-primary pb-2">Want to request a song? Scan below:</h3>
                <img src="./images/qr-code.svg" alt="">
              </div>
            </div>
            <div
              id="queueSection"
              class="d-none col-md p-3 overflow-hidden w-md-50 text-center"
            >
              <h1 class="text-primary mb-4" id="comingUpHeader">Coming Up...</h1>
              <div id="queue" class=""></div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer class="text-center text-wrap">
      <p class="mt-3 mb-4 ps-3 pe-3">
        See anything wrong? Please email us:
        <a href="mailto:mwangsard25@gmail.com?subject=Bug%20report"
          >mwangsard25@gmail.com</a
        >
      </p>
    </footer>
  </body>
</html>
