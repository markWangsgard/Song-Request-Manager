<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="./css/custom.css" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lobster&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <script type="module" src="scripts/admin-settings-ui.js"></script>

    <link rel="icon" type="image/x-icon" href="images/favicon.png" />
    <title>Snow College Western Swing</title>
  </head>
  <body class="d-flex flex-column">
    <header>
      <img
        src="images/logo2.png"
        alt="Snow College Western Swing Logo"
        class="mx-auto d-block mt-5 invert"
        style="width: 200px; height: auto"
      />
    </header>
    <main
      class="flex-grow-1 flex text-center justify-contet-center align-items-center"
    >
      <div class="d-flex flex-column align-items-center">
        <h3>Sign In</h3>
        <button id="signIn" class="btn btn-outline-primary mt-3">
          Sign In
        </button>
        <h5 class="mt-3" id="userName">Signed in as ...</h5>
        <hr class="w-50" />
      </div>
      <div class="d-flex flex-column align-items-center">
        <h3>Select Playlist</h3>
        <button class="mt-3 btn btn-outline-primary" id="selectPlaylist">Select Playlist</button>
        <h5 class="mt-3">Playlist selected: ...</h5>
        <hr class="w-50" />
      </div>
      <div class="d-flex flex-column align-items-center">
        <h3>Song Request Limit</h3>
        <div class="d-flex justify-content-center mt-3 mb-2">
          <label class="" for="requestLimit">Number of Songs: </label>
          <input
            class="ms-3 btn btn-outline-primary"
            type="number"
            name="requestLimit"
            id="requestLimit"
            min="1"
            value="1"
          />
        </div>
        <hr class="w-50" />
      </div>
      <div class="d-flex flex-column align-items-center">
        <h3>Allow Repeats</h3>
        <div class="mb-2">
          <label class="switch">
            <input type="checkbox" id="allowRepeats" />
            <span class="slider"></span>
          </label>
          <label for="allowRepeats">Allow Repeats</label>
        </div>
        <hr class="w-50" />
      </div>
      <div class="d-flex flex-column align-items-center">
        <h3>Auto Add</h3>
        <div class="mb-2">
          <label class="switch">
            <input type="checkbox" id="autoAdd" />
            <span class="slider"></span>
          </label>
          <label for="autoAdd">Auto Add</label>
        </div>
        <div id="autoAddSelection" class="visually-hidden">
          <h5>Set Time</h5>
          <div>
            <div class="container m-4">
              <fieldset
                class="d-flex mt-2 mb-3 row justify-content-center"
                aria-labelledby="daysLabel"
                style="gap: 0.5rem"
              >
                <legend id="daysLabel" class="visually-hidden">
                  Select days of the week
                </legend>

                <div class="form-check col-3">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    name="days[]"
                    value="monday"
                    id="dayMonday"
                  />
                  <label class="form-check-label" for="dayMonday">Monday</label>
                </div>

                <div class="form-check col-3">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    name="days[]"
                    value="tuesday"
                    id="dayTuesday"
                  />
                  <label class="form-check-label" for="dayTuesday"
                    >Tuesday</label
                  >
                </div>

                <div class="form-check col-3">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    name="days[]"
                    value="wednesday"
                    id="dayWednesday"
                  />
                  <label class="form-check-label" for="dayWednesday"
                    >Wednesday</label
                  >
                </div>

                <div class="form-check col-3">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    name="days[]"
                    value="thursday"
                    id="dayThursday"
                  />
                  <label class="form-check-label" for="dayThursday"
                    >Thursday</label
                  >
                </div>

                <div class="form-check col-3">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    name="days[]"
                    value="friday"
                    id="dayFriday"
                  />
                  <label class="form-check-label" for="dayFriday">Friday</label>
                </div>

                <div class="form-check col-3">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    name="days[]"
                    value="saturday"
                    id="daySaturday"
                  />
                  <label class="form-check-label" for="daySaturday"
                    >Saturday</label
                  >
                </div>

                <div class="form-check col-3">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    name="days[]"
                    value="sunday"
                    id="daySunday"
                  />
                  <label class="form-check-label" for="daySunday">Sunday</label>
                </div>
              </fieldset>
            </div>

            <input
              class="p-2 rounded bg-body border-primary text-primary color-primary"
              type="time"
              name="timePicker"
              id="timePicker"
            />
          </div>
        </div>
        <hr class="w-50" />
      </div>
    </main>
  </body>
</html>
