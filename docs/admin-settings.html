<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="./css/custom.css" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lobster&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <script type="module" src="scripts/admin-settings-ui.js"></script>

    <link rel="icon" type="image/x-icon" href="images/favicon.png" />
    <title>Snow College Western Swing</title>
  </head>
  <body class="d-flex flex-column">
    <header>
      <img
        src="images/logo2.png"
        alt="Snow College Western Swing Logo"
        class="mx-auto d-block mt-5 invert"
        style="width: 200px; height: auto"
      />
    </header>
    <main
      class="flex-grow-1 flex text-center justify-contet-center align-items-center"
    >
      <div class="d-flex flex-column align-items-center">
        <h3>Select Playlist</h3>
        <button>Select Playlist</button>
        <hr class="w-50" />
      </div>
      <div class="d-flex flex-column align-items-center">
        <h3>Clear Requests</h3>
        <button>Clear Requests</button>
        <hr class="w-50" />
      </div>
      <div class="d-flex flex-column align-items-center">
        <h3>Song Request Limit</h3>
        <div>
          <label for="requestLimit">Number of Songs: </label>
          <input class="ms-3" type="number" name="requestLimit" value="1" />
        </div>
        <hr class="w-50" />
      </div>
      <div class="d-flex flex-column align-items-center">
        <h3>Allow Repeats</h3>
        <div>
          <input type="checkbox" name="allowRepeats" id="allowRepeats">
          <label for="allowRepeats">Allow Repeats</label>
        </div>
        <hr class="w-50" />
      </div>
      <div class="d-flex flex-column align-items-center">
        <h3>Auto Add</h3>
        <div>
          <input type="checkbox" name="autoAdd" id="autoAdd">
          <label for="autoAdd">Auto Add</label>
        </div>
        <h5>Set Time</h5>
        <div>
          <fieldset class="" aria-labelledby="daysLabel" style="gap: .5rem;">
            <legend id="daysLabel" class="visually-hidden">Select days of the week</legend>

            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="days[]" value="monday" id="dayMonday">
              <label class="form-check-label" for="dayMonday">Monday</label>
            </div>

            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="days[]" value="tuesday" id="dayTuesday">
              <label class="form-check-label" for="dayTuesday">Tuesday</label>
            </div>

            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="days[]" value="wednesday" id="dayWednesday">
              <label class="form-check-label" for="dayWednesday">Wednesday</label>
            </div>

            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="days[]" value="thursday" id="dayThursday">
              <label class="form-check-label" for="dayThursday">Thursday</label>
            </div>

            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="days[]" value="friday" id="dayFriday">
              <label class="form-check-label" for="dayFriday">Friday</label>
            </div>

            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="days[]" value="saturday" id="daySaturday">
              <label class="form-check-label" for="daySaturday">Saturday</label>
            </div>

            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="days[]" value="sunday" id="daySunday">
              <label class="form-check-label" for="daySunday">Sunday</label>
            </div>
          </fieldset>

          <input type="time" name="" id="">
        </div>
        <hr class="w-50" />
      </div>
      <div class="d-flex flex-column align-items-center">
        <h3>Sign In</h3>
        <button id="signIn">Sign In</button>
        <hr class="w-50" />
      </div>
    </main>
  </body>
</html>
