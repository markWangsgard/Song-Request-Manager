<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="./css/custom.css" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lobster&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <script src="scripts/signalr/signalr.js"></script>
    <script type="module" src="scripts/admin-ui.js"></script>
    <script type="module" src="scripts/updates.js"></script>
    <script type="module" src="scripts/navigation.js"></script>
    <script type="module" src="scripts/cowboy-loading.js"></script>

    <link rel="icon" type="image/x-icon" href="images/favicon.png" />
    <title>Snow College Western Swing</title>
  </head>
  <body class="d-flex flex-column vh-100">
    <header>
      <img
        id="logo"
        src="images/logo3.svg"
        alt="Snow College Western Swing Logo"
        class="mx-auto d-block mt-5 mb-4 invert"
        style="width: 200px; height: auto"
      />
    </header>
    <main
      class="flex-grow-1 d-flex flex-column text-center justify-contet-center align-items-center"
    >
      <h2
        class="d-none bg-danger text-white w-75 rounded pt-2 pb-2"
        id="loginWarning"
      >
      <a href="./admin-settings.html" class="text-white text-decoration-none">
        Please Login
      </a>
      </h2>
      <h2
        class="d-none bg-danger text-white w-75 rounded pt-2 pb-2"
        id="playlistWarning"
      >
        Please Select a Playlist
      </h2>
      <nav class="navbar flex justify-content-center mt-1">
        <input
          type="search"
          name="search"
          id="search"
          class="text-white w-75 rounded-pill form-control mr2-2 mb-4 bg-tertiary"
          placeholder="Search"
          aria-label="Search"
        />
      </nav>
      <h1 class="text-primary" id="SectionHeader">Requested Songs</h1>
      <p>You have <span id="remaining-requests">3</span> requests remaining</p>
      <div
        id="results"
        class="d-flex flex-wrap mw-100 justify-content-center"
      >
        <cowboy-loader size="200" speed="2.6s" color="white"></cowboy-loader>
      </div>
      <!-- <img src="./images/add-icon.svg" alt="" class="invert"> -->
    </main>
    <footer class="text-center text-wrap">
      <p class="mt-3 mb-4 ps-3 pe-3">See anything wrong? Please email us: <a href="mailto:mwangsard25@gmail.com?subject=Bug%20report">mwangsard25@gmail.com</a></p>
    </footer>
  </body>
</html>
