<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="./css/custom.css" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lobster&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <script type="module" src="scripts/admin-ui.js"></script>

    <link rel="icon" type="image/x-icon" href="images/favicon.png" />
    <title>Snow College Western Swing</title>
  </head>
  <body class="d-flex flex-column">
    <header>
      <img
        src="images/logo2.png"
        alt="Snow College Western Swing Logo"
        id="logo"
        class="mx-auto d-block mt-5 invert"
        style="width: 200px; height: auto"
      />
    </header>
    <main
      class="flex-grow-1 d-flex flex-column text-center justify-contet-center align-items-center"
    >
      <h2
        class="d-none bg-danger text-white w-75 rounded pt-2 pb-2"
        id="loginWarning"
      >
        Please Login
      </h2>
      <h2
        class="d-none bg-danger text-white w-75 rounded pt-2 pb-2"
        id="playlistWarning"
      >
        Please Select a Playlist
      </h2>
      <nav class="navbar flex justify-content-center mt-1">
        <input
          type="search"
          name="search"
          id="search"
          class="text-white w-75 rounded-pill form-control mr2-2 mb-4 bg-tertiary"
          placeholder="Search"
          aria-label="Search"
        />
      </nav>
      <h1 class="text-primary" id="SectionHeader">Requested Songs</h1>
      <div
        id="results"
        class="d-flex flex-wrap mw-100 justify-content-start justify-content-sm-center"
      >
        <cowboy-loader size="200" speed="2.6s" color="white"></cowboy-loader>
      </div>
      <!-- <img src="./images/add-icon.svg" alt="" class="invert"> -->
    </main>
  </body>
</html>
