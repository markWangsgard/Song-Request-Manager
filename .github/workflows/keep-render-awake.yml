name: Keep Render Awake (Wednesdays 6–11 PM MT)

on:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service if within Wednesday window
        run: |
          # Mountain Time (DST-aware)
          HOUR_MT=$(TZ="America/Denver" date +%H)
          DAY_MT=$(TZ="America/Denver" date +%u)  # 1=Mon ... 7=Sun

          # Wednesday = 3
          if [ "$DAY_MT" -eq 6 ] && [ "$HOUR_MT" -ge 10 ] && [ "$HOUR_MT" -lt 23 ]; then
            echo "Wednesday 6–11 PM MT — pinging Render"
            curl -s https://song-request-manager.onrender.com/ping > /dev/null
          else
            echo "Outside scheduled window — skipping ping"
          fi